name: "RTC Reward Action"
description: "Automatically award RTC tokens when a PR is merged"
author: "daletyler1737"
branding:
  icon: "award"
  color: "green"
inputs:
  node-url:
    description: "RTC node URL"
    required: true
    default: "https://50.28.86.131"
  amount:
    description: "RTC amount to award per merge"
    required: true
    default: "5"
  wallet-from:
    description: "Source wallet or account"
    required: true
  admin-key:
    description: "Admin key for the RTC node"
    required: true
  dry-run:
    description: "Enable dry-run mode"
    required: false
    default: "false"
runs:
  using: "node20"
  main: "src/index.js"
  env:
    NODE_OPTIONS: "--no-warnings"
